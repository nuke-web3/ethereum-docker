volumes:
  celestia-keyring:

services:
  init-celestia-key:
    image: ghcr.io/celestiaorg/celestia-node:v0.28.4
    user: "0:0"
    environment:
      CELESTIA_TX_KEY_NAME: ${CELESTIA_TX_KEY_NAME}
      CELESTIA_TX_MNEMONIC: ${CELESTIA_TX_MNEMONIC}
      CELESTIA_TX_ADDRESS: ${CELESTIA_TX_ADDRESS}
      CELESTIA_TX_KEYRING_BACKEND: test
      CELESTIA_TX_KEYRING_PATH: /celestia-keyring
    entrypoint: ["/usr/bin/env", "bash", "/scripts/generate_celestia_devkey.sh"]
    volumes:
      - celestia-keyring:/celestia-keyring
      - ./scripts/generate_celestia_devkey.sh:/scripts/generate_celestia_devkey.sh:ro
    restart: "no"
