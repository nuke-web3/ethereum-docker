  anvil:
    # run ephemiral from scratch, no persistance
    image: ghcr.io/foundry-rs/foundry:v1.5.1
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "900"]
    ports:
      - "8545:8545"  

  op-deployer-init:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer:v0.5.2
    depends_on: [anvil]
    volumes:
      - ./config:/config
      - ./scripts:/work/scripts:ro
    env_file:
      - .env
    environment:
      # only override the ones that must be different *inside docker*
      L1_RPC_URL: "http://anvil:8545"
      WORKDIR: "/config"
    command: ["/work/scripts/init-op-contracts-on-l1.sh"]
