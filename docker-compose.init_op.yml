volumes:
  op-geth-data:
  common-config:

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.5.1
    restart: unless-stopped
    entrypoint: ["/work/scripts/anvil-entrypoint.sh"]
    env_file:
      - .env
    environment:
      STATE_PATH: "/config/anvil-state.json"
    volumes:
      - common-config:/config
      - ./scripts:/work/scripts:ro
    ports:
      - "${L1_RPC_PORT}:${L1_RPC_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/${L1_RPC_PORT}'"]
      interval: 1s
      timeout: 3s
      retries: 10

  op-deployer-init:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer:v0.5.2
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - common-config:/config
      - ./scripts:/work/scripts:ro
    env_file:
      - .env
    environment:
      L1_RPC_URL: "http://anvil:${L1_RPC_PORT}"
      WORKDIR: "/config"
    command: ["/work/scripts/init-op-contracts-on-l1.sh"]

  op-geth-init:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:v1.101602.3
    restart: "no"
    depends_on:
      op-deployer-init:
        condition: service_completed_successfully
    env_file: [.env]
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -euo pipefail

        : "$${L2_CHAIN_ID:?missing L2_CHAIN_ID}"
        GENESIS="/config/$${L2_CHAIN_ID}-genesis.json"

        if [ ! -f "$${GENESIS}" ]; then
          echo "[ERROR] missing genesis: $${GENESIS}"
          exit 1
        fi

        if [ -f /data/geth/chaindata/CURRENT ]; then
          echo "[SKIP] (already initialized) chain=$${L2_CHAIN_ID}"
          exit 0
        fi

        geth init --datadir=/data "$${GENESIS}" >/dev/null
        echo "[DONE] init chain=$${L2_CHAIN_ID}"
    volumes:
      - op-geth-data:/data
      - common-config:/config:ro

