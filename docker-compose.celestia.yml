networks:
  shared: {}

volumes:
  celestia-shared:
  celestia-keyring:

services:
  celestia-app:
    image: ghcr.io/celestiaorg/celestia-app:v6.4.2
    user: "0:0"
    networks:
      - shared
    volumes:
      - celestia-shared:/data/local-celestia
      - celestia-keyring:/celestia-keyring
      - ./scripts/celestia-app-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "${CELESTIA_CORE_GRPC_PORT}:${CELESTIA_CORE_GRPC_PORT}"
      - "${CELESTIA_APP_RPC_PORT}:${CELESTIA_APP_RPC_PORT}"
    expose:
      - "${CELESTIA_P2P_PORT}"
    environment:
      APP_HOME: /data/local-celestia
      CHAIN_ID: ${CELESTIA_NETWORK}
      FUND_ADDR: ${CELESTIA_TX_ADDRESS}
      FUND_AMOUNT: ${CELESTIA_FUND_AMOUNT}
      STAKE_AMOUNT: ${CELESTIA_STAKE_AMOUNT}
      FEES: ${CELESTIA_FEES}
      CELESTIA_APP_RPC_PORT: ${CELESTIA_APP_RPC_PORT}
      CELESTIA_CORE_GRPC_PORT: ${CELESTIA_CORE_GRPC_PORT}
      CELESTIA_KEYRING_PATH: /celestia-keyring
      CELESTIA_TX_KEY_NAME: ${CELESTIA_TX_KEY_NAME}
    entrypoint: ["/usr/bin/env", "bash", "/entrypoint.sh"]
    healthcheck:
      test:
        - CMD-SHELL
        - |
          STATUS=$$(celestia-appd status 2>/dev/null || true)
          HEIGHT=$$(printf '%s\n' "$$STATUS" | sed -n 's/.*"latest_block_height":"\([^"]*\)".*/\1/p')
          test -n "$$HEIGHT" && [ "$$HEIGHT" -ge 1 ]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 1s

  celestia-bridge:
    image: ghcr.io/celestiaorg/celestia-node:v0.28.4
    user: "0:0"
    depends_on:
      celestia-app:
        condition: service_healthy
    networks:
      - shared
    volumes:
      - celestia-shared:/data/local-celestia
      - ./scripts/celestia-bridge-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "${CELESTIA_NODE_RPC_PORT}:${CELESTIA_NODE_RPC_PORT}"
    expose:
      - "${CELESTIA_P2P_PORT}"
    environment:
      NODE_STORE: /data/local-celestia/bridge
      CELESTIA_NETWORK: ${CELESTIA_NETWORK}
      CELESTIA_CORE_GRPC_PORT: ${CELESTIA_CORE_GRPC_PORT}
      CELESTIA_NODE_RPC_PORT: ${CELESTIA_NODE_RPC_PORT}
      CELESTIA_APP_RPC_HOST: celestia-app
    entrypoint: ["/usr/bin/env", "bash", "/entrypoint.sh"]
