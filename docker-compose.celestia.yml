networks:
  celestia-net:
    driver: bridge

volumes:
  celestia-shared:

services:
  celestia-app:
    image: ghcr.io/celestiaorg/celestia-app:v6.4.2
    user: "0:0" # run as root
    networks:
      - celestia-net
    volumes:
      - celestia-shared:/data/local-celestia
    ports:
      - "9090:9090"   # gRPC
      - "26657:26657" # Tendermint RPC (health)
    expose:
      - "2121" # P2P
    environment:
      # Dev mnemonic for cel-key:
      # unique jaguar empower frozen task napkin brisk web popular forest plastic repeat buffalo tape iron reject flat aim laundry latin tattoo input camera above
      # key:
      # 86877e42c2d145b694e12e1f1bea7c837113737a4dd52e0ea7e900251d51bfe9
      FUND_ADDR: "celestia1hkrz4dw26z69kmrfzjy0r0kjnkh5jkle3376nl"
      FUND_AMOUNT: "1000000000000utia"
      STAKE_AMOUNT: "5000000000utia"
      FEES: "500utia"
      CHAIN_ID: "private"
      APP_HOME: "/data/local-celestia"
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        set -euo pipefail
        APPD=celestia-appd
        echo "[info] $$($$APPD version 2>&1)"
        echo "[info] home=$$APP_HOME chain=$$CHAIN_ID"

        mkdir -p "$$APP_HOME"

        if [ -f "$$APP_HOME/config/genesis.json" ]; then
          echo "[init] existing node home detected at $$APP_HOME"
          echo "[init] skipping init/genesis; starting with existing state"
        else
          echo "[init] no genesis found, bootstrapping new chain"

          echo "[init] writing config & genesis"
          $$APPD init "$$CHAIN_ID" --chain-id "$$CHAIN_ID" --home "$$APP_HOME" &>/dev/null

          echo "[keys] creating validator key (keyring=test)"
          $$APPD keys add validator --keyring-backend test --home "$$APP_HOME" &>/dev/null

          VAL_ADDR=$$( $$APPD keys show validator -a --keyring-backend test --home "$$APP_HOME" )

          echo "[genesis] funding validator=$$VAL_ADDR and user=$$FUND_ADDR"
          $$APPD genesis add-genesis-account "$$VAL_ADDR" "$$FUND_AMOUNT" --home "$$APP_HOME" &>/dev/null
          $$APPD genesis add-genesis-account "$$FUND_ADDR" "$$FUND_AMOUNT" --home "$$APP_HOME" &>/dev/null

          echo "[gentx] staking $$STAKE_AMOUNT (fees $$FEES)"
          $$APPD genesis gentx validator "$$STAKE_AMOUNT" \
            --fees "$$FEES" \
            --keyring-backend test \
            --chain-id "$$CHAIN_ID" \
            --home "$$APP_HOME" &>/dev/null

          echo "[collect] including gentxs"
          $$APPD genesis collect-gentxs --home "$$APP_HOME" &>/dev/null
        fi

        echo "[start] RPC :26657  gRPC :9090"
        exec $$APPD start --home "$$APP_HOME" \
          --rpc.laddr tcp://0.0.0.0:26657 \
          --grpc.enable=true \
          --grpc.address 0.0.0.0:9090 \
          --force-no-bbr
    healthcheck:
      test:
        - CMD-SHELL
        - |
          STATUS=$$(celestia-appd status 2>/dev/null || true)
          HEIGHT=$$(printf '%s\n' "$$STATUS" | sed -n 's/.*"latest_block_height":"\([^"]*\)".*/\1/p')
          if [ "$$HEIGHT" -ge 1 ]; then
            exit 0
          fi
          exit 1
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 1s

  celestia-bridge:
    image: ghcr.io/celestiaorg/celestia-node:v0.28.4
    user: "0:0" # run as root
    depends_on:
      celestia-app:
        condition: service_healthy
    networks:
      - celestia-net
    volumes:
      - celestia-shared:/data/local-celestia
    ports:
      - "26658:26658" # Node HTTP RPC
    expose:
      - "2121" # P2P
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        NODE_STORE="/data/local-celestia/bridge"

        # One-time init (idempotent)
        if [ ! -d "$$NODE_STORE" ] || [ -z "$$(ls -A "$$NODE_STORE" 2>/dev/null)" ]; then
          echo "[init] initializing bridge store at $$NODE_STORE"
          celestia bridge init \
            --p2p.network private \
            --node.store "$$NODE_STORE" \
            --core.ip celestia-app \
            --core.port 9090
        else
          echo "[init] existing bridge store found; skipping init"
        fi

        echo "[start] starting bridge node (p2p.network=private)"
        exec celestia bridge start \
          --p2p.network private \
          --node.store "$$NODE_STORE" \
          --core.ip celestia-app \
          --core.port 9090 \
          --rpc.addr 0.0.0.0 \
          --rpc.port 26658 \
          --log.level.module share/discovery:error \
          --log.level.module module/p2p:panic
