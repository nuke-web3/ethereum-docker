networks:
  anvil-net:
    driver: bridge

volumes:
  anvil:
  common-config:

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.5.1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STATE_PATH: "/config/anvil-state.json"
    volumes:
      - common-config:/config:ro
      - ./scripts:/work/scripts:ro
    ports:
      - "${L1_RPC_PORT}:${L1_RPC_PORT}"
    entrypoint:
      - anvil
      - --host
      - 0.0.0.0
      - --port
      - "${L1_RPC_PORT}"
      - --block-time
      - "1"
      - --load-state
      - "/config/anvil-state.json"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/${L1_RPC_PORT}'"]
      interval: 1s
      timeout: 3s
      retries: 10
